<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chronicle — RPG Memory Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   TOKENS — DARK THEME (default)
═══════════════════════════════════════════════ */
:root,[data-theme="dark"]{
  --bg-base:    #060810;
  --bg-surface: #0b0f1a;
  --bg-raised:  #101626;
  --bg-overlay: #141d30;
  --bg-input:   #0e1422;

  --border-subtle:  rgba(255,255,255,.05);
  --border-default: rgba(255,255,255,.09);
  --border-strong:  rgba(255,255,255,.16);

  --gold:      #d4a843;
  --gold-lt:   #f0c76a;
  --gold-dk:   #8a6520;
  --gold-glow: rgba(212,168,67,.22);
  --gold-bg:   rgba(212,168,67,.07);

  --ember:     #e8724a;
  --ember-glow:rgba(232,114,74,.2);

  --jade:      #3ecf8e;
  --jade-glow: rgba(62,207,142,.18);
  --jade-bg:   rgba(62,207,142,.07);

  --sapphire:  #4f8ef7;
  --sapphire-glow:rgba(79,142,247,.18);

  --crimson:   #e05555;
  --crimson-bg:rgba(224,85,85,.1);

  --amethyst:  #a78bfa;

  --tx-primary:   #e8eff8;
  --tx-secondary: #7a95b4;
  --tx-tertiary:  #3a506b;
  --tx-inverse:   #0b0f1a;

  --user-bubble-bg: linear-gradient(145deg, #111e38 0%, #162545 100%);
  --user-bubble-border: rgba(79,142,247,.2);
  --ai-bubble-bg:   #0c1320;
  --ai-bubble-border: rgba(255,255,255,.07);

  --sidebar-bg:  #090d18;
  --topbar-bg:   rgba(9,13,24,.92);

  --shadow-sm:  0 2px 8px rgba(0,0,0,.4);
  --shadow-md:  0 4px 20px rgba(0,0,0,.55);
  --shadow-lg:  0 8px 40px rgba(0,0,0,.65);
  --shadow-gold:0 0 24px rgba(212,168,67,.15);

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;

  --font-display: 'Cinzel Decorative', serif;
  --font-heading: 'Cinzel', serif;
  --font-body:    'Crimson Pro', serif;
  --font-mono:    'JetBrains Mono', monospace;

  --transition: .18s cubic-bezier(.4,0,.2,1);
  --transition-fast: .1s ease;

  --particle-color: rgba(212,168,67,.6);
}

/* ═══════════════════════════════════════════════
   TOKENS — LIGHT THEME
═══════════════════════════════════════════════ */
[data-theme="light"]{
  --bg-base:    #f5f0e8;
  --bg-surface: #ede8df;
  --bg-raised:  #e4ddd3;
  --bg-overlay: #dcd4c8;
  --bg-input:   #f0ece4;

  --border-subtle:  rgba(0,0,0,.06);
  --border-default: rgba(0,0,0,.1);
  --border-strong:  rgba(0,0,0,.18);

  --gold:      #a0721c;
  --gold-lt:   #c49030;
  --gold-dk:   #7a5510;
  --gold-glow: rgba(160,114,28,.18);
  --gold-bg:   rgba(160,114,28,.08);

  --ember:     #c4512e;
  --ember-glow:rgba(196,81,46,.15);

  --jade:      #1a7a52;
  --jade-glow: rgba(26,122,82,.15);
  --jade-bg:   rgba(26,122,82,.08);

  --sapphire:  #2456b0;
  --sapphire-glow:rgba(36,86,176,.15);

  --crimson:   #b83030;
  --crimson-bg:rgba(184,48,48,.08);

  --amethyst:  #6d4db8;

  --tx-primary:   #1a1610;
  --tx-secondary: #5a4e3e;
  --tx-tertiary:  #9a8e7e;
  --tx-inverse:   #f5f0e8;

  --user-bubble-bg: linear-gradient(145deg,#dde8f8,#cddaf4);
  --user-bubble-border: rgba(36,86,176,.2);
  --ai-bubble-bg:   #eae4da;
  --ai-bubble-border: rgba(0,0,0,.1);

  --sidebar-bg:  #e0d9cf;
  --topbar-bg:   rgba(224,217,207,.94);

  --shadow-sm:  0 2px 8px rgba(0,0,0,.1);
  --shadow-md:  0 4px 20px rgba(0,0,0,.14);
  --shadow-lg:  0 8px 40px rgba(0,0,0,.18);
  --shadow-gold:0 0 24px rgba(160,114,28,.12);

  --particle-color: rgba(160,114,28,.4);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{
  background:var(--bg-base);
  color:var(--tx-primary);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.65;
  transition:background var(--transition),color var(--transition);
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--tx-tertiary)}
button,input,textarea,select{font-family:var(--font-body);outline:none;border:none;background:none;color:inherit}
button{cursor:pointer}
textarea{resize:vertical}
a{color:var(--sapphire);text-decoration:none}
[contenteditable]:empty::before{content:attr(data-ph);color:var(--tx-tertiary);pointer-events:none;font-style:italic}

/* ═══════════════════════════════════════════════
   LAYOUT GRID
═══════════════════════════════════════════════ */
.app{
  display:grid;
  grid-template-columns:256px 1fr;
  grid-template-rows:58px 1fr;
  height:100vh;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   CANVAS (particle bg)
═══════════════════════════════════════════════ */
#particle-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar{
  grid-column:1/-1;
  position:relative;z-index:100;
  background:var(--topbar-bg);
  backdrop-filter:blur(12px) saturate(150%);
  border-bottom:1px solid var(--border-default);
  display:flex;align-items:center;
  padding:0 18px 0 0;
  gap:0;
}
.topbar-brand{
  width:256px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 18px;
  border-right:1px solid var(--border-subtle);
  height:100%;
}
.brand-mark{
  width:36px;height:36px;flex-shrink:0;
  background:var(--gold-bg);
  border:1px solid var(--gold-dk);
  border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-gold),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.brand-mark::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 60%);
}
.brand-mark svg{width:18px;height:18px;fill:var(--gold)}
.brand-name{
  font-family:var(--font-heading);
  font-size:12px;letter-spacing:.22em;
  color:var(--gold-lt);
  text-shadow:0 0 20px var(--gold-glow);
  line-height:1.2;
}
.brand-sub{font-size:9px;letter-spacing:.18em;color:var(--tx-tertiary);margin-top:1px}

.topbar-center{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px}
.world-status{
  display:flex;align-items:center;gap:6px;
  background:var(--bg-raised);
  border:1px solid var(--border-default);
  border-radius:var(--radius-lg);
  padding:5px 14px 5px 10px;
  font-family:var(--font-mono);
  font-size:10.5px;color:var(--tx-secondary);
  max-width:520px;overflow:hidden;
}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--jade);flex-shrink:0;
  box-shadow:0 0 6px var(--jade-glow);animation:pulse-dot 2.4s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.ws-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.topbar-right{display:flex;align-items:center;gap:8px;padding-left:14px}
.icon-btn{
  width:34px;height:34px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  color:var(--tx-secondary);transition:all var(--transition);
  background:transparent;
  border:1px solid transparent;
}
.icon-btn:hover{background:var(--bg-raised);border-color:var(--border-default);color:var(--tx-primary)}
.icon-btn svg{width:16px;height:16px}
.theme-btn{position:relative;overflow:hidden}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar{
  background:var(--sidebar-bg);
  border-right:1px solid var(--border-default);
  display:flex;flex-direction:column;
  position:relative;z-index:10;
  overflow:hidden;
}
/* subtle vertical gradient line on right edge */
.sidebar::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,var(--gold-dk) 30%,var(--gold-dk) 70%,transparent);
  opacity:.35;
}

.sidebar-inner{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:2px}

/* Player card */
.player-card{
  background:var(--bg-raised);
  border:1px solid var(--border-default);
  border-radius:var(--radius-lg);
  padding:14px;
  margin-bottom:14px;
  position:relative;overflow:hidden;
}
.player-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.5;
}
.player-avatar{
  width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold-dk),#2a1800);
  border:1px solid var(--gold-dk);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:9px;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.player-name{font-family:var(--font-heading);font-size:12px;letter-spacing:.1em;color:var(--gold-lt);margin-bottom:2px}
.player-loc{font-size:11px;color:var(--tx-tertiary);font-family:var(--font-mono);margin-bottom:10px}
.xp-label{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--tx-tertiary);margin-bottom:4px}
.xp-bar{height:3px;background:var(--border-subtle);border-radius:99px;overflow:hidden}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dk),var(--gold));
  transition:width .6s ease;box-shadow:0 0 8px var(--gold-glow)}

/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.stat-box{
  background:var(--bg-raised);border:1px solid var(--border-subtle);
  border-radius:var(--radius-md);padding:8px 6px;text-align:center;
}
.stat-val{font-family:var(--font-heading);font-size:15px;color:var(--gold-lt);line-height:1}
.stat-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-tertiary);margin-top:3px}

/* Section label */
.sec-label{
  font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--tx-tertiary);font-family:var(--font-mono);
  padding:4px 8px 3px;margin-top:6px;
}

/* Nav buttons */
.nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--radius-md);
  color:var(--tx-secondary);font-size:13.5px;font-weight:400;
  transition:all var(--transition);width:100%;text-align:left;
  position:relative;
}
.nav-btn .nb-icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-overlay);font-size:14px;flex-shrink:0;
  transition:all var(--transition);
}
.nav-btn:hover{color:var(--tx-primary);background:var(--bg-overlay)}
.nav-btn:hover .nb-icon{background:var(--bg-raised)}
.nav-btn.active{color:var(--gold-lt);}
.nav-btn.active .nb-icon{
  background:var(--gold-bg);
  border:1px solid var(--gold-dk);
  box-shadow:0 0 10px var(--gold-glow);
}
.nav-btn.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;border-radius:99px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
}
.nb-badge{
  margin-left:auto;background:var(--gold-bg);border:1px solid var(--gold-dk);
  color:var(--gold);font-size:9px;font-family:var(--font-mono);font-weight:600;
  padding:1px 6px;border-radius:99px;
}

.sidebar-divider{height:1px;background:var(--border-subtle);margin:10px 4px}

.nav-btn.green .nb-icon{color:var(--jade)}
.nav-btn.green:hover{background:var(--jade-bg)}
.nav-btn.red .nb-icon{color:var(--crimson)}
.nav-btn.red:hover{background:var(--crimson-bg)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* Debug panel */
.debug-panel{
  margin:8px 0 0;
  background:var(--bg-base);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-md);
  padding:9px 10px;
  font-family:var(--font-mono);font-size:9.5px;
  line-height:1.85;
}
.debug-hd{
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--tx-tertiary);border-bottom:1px solid var(--border-subtle);
  padding-bottom:4px;margin-bottom:5px;display:flex;align-items:center;gap:5px;
}
.debug-hd-dot{width:5px;height:5px;border-radius:50%;background:var(--jade);
  box-shadow:0 0 4px var(--jade-glow)}
.db-row{display:flex;align-items:baseline;gap:5px}
.db-key{color:var(--tx-tertiary)}
.db-val-skip{color:var(--tx-tertiary)}
.db-val-fetch{color:var(--jade)}
.db-val-world{color:var(--sapphire)}
.db-val-npc{color:var(--gold)}
.db-val-err{color:var(--crimson)}

/* ═══════════════════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════════════════ */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
.panel{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ═══════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════ */
.chat-search-bar{
  padding:8px 20px;background:var(--bg-surface);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:8px;
}
.chat-search-input{
  flex:1;background:var(--bg-raised);border:1px solid var(--border-default);
  border-radius:var(--radius-md);padding:5px 12px;
  font-size:12px;color:var(--tx-primary);font-family:var(--font-mono);
  transition:border-color var(--transition);
}
.chat-search-input:focus{border-color:var(--gold-dk)}
.cs-count{font-size:10px;color:var(--tx-tertiary);font-family:var(--font-mono);white-space:nowrap}

.chat-feed{
  flex:1;overflow-y:auto;
  padding:28px 32px 16px;
  display:flex;flex-direction:column;
  gap:0;
}

/* empty state */
.empty-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:48px 32px;text-align:center;
}
.empty-sigil{
  width:80px;height:80px;
  background:var(--gold-bg);
  border:1px solid var(--gold-dk);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin-bottom:20px;
  box-shadow:var(--shadow-gold);
}
.empty-title{
  font-family:var(--font-heading);font-size:19px;
  color:var(--gold-lt);letter-spacing:.1em;margin-bottom:8px;
}
.empty-body{font-size:14px;color:var(--tx-tertiary);max-width:320px;line-height:1.7;margin-bottom:24px}
.empty-hints{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  max-width:460px;
}
.hint-chip{
  background:var(--bg-raised);border:1px solid var(--border-default);
  border-radius:var(--radius-lg);padding:6px 14px;
  font-size:12px;color:var(--tx-secondary);cursor:pointer;
  transition:all var(--transition);
}
.hint-chip:hover{border-color:var(--gold-dk);color:var(--gold-lt);background:var(--gold-bg)}

/* messages */
.msg-group{margin-bottom:18px}
.msg-group-date{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:9.5px;
  color:var(--tx-tertiary);letter-spacing:.12em;
  margin:8px 0 14px;
}
.msg-group-date::before,.msg-group-date::after{
  content:'';flex:1;height:1px;background:var(--border-subtle);
}

.msg-row{
  display:flex;flex-direction:column;
  margin-bottom:2px;
}
.msg-row.user{align-items:flex-end}
.msg-row.ai{align-items:flex-start}

.msg-meta{
  display:flex;align-items:center;gap:7px;
  padding:0 4px;margin-bottom:4px;
}
.msg-row.user .msg-meta{flex-direction:row-reverse}
.msg-avatar{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.msg-row.user .msg-avatar{background:var(--sapphire-glow);border:1px solid var(--user-bubble-border)}
.msg-row.ai  .msg-avatar{background:var(--gold-bg);border:1px solid var(--gold-dk)}
.msg-sender{font-size:10.5px;font-weight:600;letter-spacing:.05em;font-family:var(--font-mono)}
.msg-row.user .msg-sender{color:var(--sapphire)}
.msg-row.ai  .msg-sender{color:var(--gold)}
.msg-time{font-size:9px;color:var(--tx-tertiary);font-family:var(--font-mono)}

/* bubble */
.msg-bubble{
  max-width:72%;position:relative;
  border-radius:var(--radius-lg);
  padding:12px 16px;
  font-size:15px;line-height:1.7;
  word-break:break-word;
}
.msg-row.user .msg-bubble{
  background:var(--user-bubble-bg);
  border:1px solid var(--user-bubble-border);
  border-bottom-right-radius:4px;
  box-shadow:var(--shadow-sm);
}
.msg-row.ai .msg-bubble{
  background:var(--ai-bubble-bg);
  border:1px solid var(--ai-bubble-border);
  border-bottom-left-radius:4px;
  box-shadow:var(--shadow-sm);
}
/* shine on user bubble */
.msg-row.user .msg-bubble::before{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(145deg,rgba(255,255,255,.04),transparent 50%);
}

/* bubble action bar (hover) */
.bubble-actions{
  position:absolute;top:-16px;
  display:flex;gap:2px;
  opacity:0;pointer-events:none;
  transition:opacity var(--transition-fast);
}
.msg-row.user .bubble-actions{right:6px}
.msg-row.ai  .bubble-actions{left:6px}
.msg-bubble:hover .bubble-actions{opacity:1;pointer-events:all}
.bact{
  background:var(--bg-overlay);
  border:1px solid var(--border-strong);
  color:var(--tx-secondary);
  border-radius:5px;padding:2px 8px;
  font-size:9.5px;font-family:var(--font-mono);
  transition:all var(--transition-fast);white-space:nowrap;
}
.bact:hover{background:var(--bg-raised);color:var(--tx-primary)}
.bact.red:hover{background:var(--crimson-bg);color:var(--crimson);border-color:var(--crimson)}

/* inline edit */
.edit-ta{
  width:100%;background:var(--bg-input);
  border:1px solid var(--gold-dk);
  border-radius:var(--radius-md);
  padding:10px 12px;color:var(--tx-primary);
  font-size:15px;line-height:1.65;font-family:var(--font-body);
  min-height:60px;transition:border-color var(--transition);
}
.edit-ta:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow)}
.edit-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.edit-hint{font-size:9.5px;color:var(--tx-tertiary);margin-right:auto;font-family:var(--font-mono)}
.btn-xs{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;transition:all var(--transition-fast)}
.btn-xs.save{background:var(--jade);color:#000}
.btn-xs.cancel{background:var(--bg-overlay);color:var(--tx-secondary);border:1px solid var(--border-default)}

/* code block */
.msg-code{
  font-family:var(--font-mono);font-size:11.5px;
  background:rgba(0,0,0,.35);border:1px solid var(--border-default);
  border-radius:var(--radius-md);padding:10px 12px;
  margin:8px 0 0;overflow-x:auto;white-space:pre-wrap;
}
[data-theme="light"] .msg-code{background:rgba(0,0,0,.06)}

/* typing */
.typing-row{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:8px}
.typing-bubble{
  background:var(--ai-bubble-bg);border:1px solid var(--ai-bubble-border);
  border-radius:var(--radius-lg);border-bottom-left-radius:4px;
  padding:12px 18px;display:flex;align-items:center;gap:10px;
}
.typing-text{font-size:13px;color:var(--tx-tertiary);font-style:italic}
.tdots{display:flex;gap:4px}
.tdots span{
  width:5px;height:5px;border-radius:50%;background:var(--gold-dk);
  animation:tdot .9s ease infinite;
}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* input bar */
.input-bar{
  padding:14px 22px 16px;
  background:var(--bg-surface);
  border-top:1px solid var(--border-subtle);
}
.input-outer{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--bg-input);
  border:1px solid var(--border-default);
  border-radius:var(--radius-xl);
  padding:4px 4px 4px 16px;
  transition:border-color var(--transition),box-shadow var(--transition);
  box-shadow:var(--shadow-sm);
}
.input-outer:focus-within{
  border-color:var(--gold-dk);
  box-shadow:0 0 0 2px var(--gold-glow),var(--shadow-sm);
}
.chat-input{
  flex:1;background:transparent;color:var(--tx-primary);
  padding:9px 0;font-size:15px;line-height:1.5;
  max-height:140px;overflow-y:auto;
  font-family:var(--font-body);
}
.input-actions{display:flex;align-items:flex-end;gap:4px;flex-shrink:0;padding-bottom:4px}
.send-btn{
  padding:9px 20px;
  background:linear-gradient(145deg,var(--gold),var(--gold-dk));
  color:#000;border-radius:var(--radius-lg);
  font-weight:700;font-size:13px;font-family:var(--font-heading);
  letter-spacing:.06em;
  transition:all var(--transition);
  box-shadow:0 2px 14px var(--gold-glow);
}
.send-btn:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 4px 20px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.15);
}
.send-btn:active:not(:disabled){transform:translateY(0)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.input-hint{font-size:10px;color:var(--tx-tertiary);margin-top:6px;padding-left:2px;font-family:var(--font-mono)}

/* context menu */

  position:fixed;z-index:9999;

.ctx-item.red:hover{background:var(--crimson-bg);color:var(--crimson)}

═══════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */

/* rel colors */

.rel-hostile  .npc-d-rel{background:var(--crimson-bg);color:var(--crimson);border:1px solid rgba(224,85,85,.2)}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
.prompt-grid{display:flex;flex-direction:column;gap:12px}

/* ═══════════════════════════════════════════════
   TOASTS
═══════════════════════════════════════════════ */
.toast-stack{
  position:fixed;bottom:22px;right:22px;

}

  display:flex;align-items:center;gap:10px;

═══════════════════════════════════════════════ */

<body>
<canvas id="particle-canvas"></canvas>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── API ─────────────────────────────────────────────────────────────────── */
const api = {
  get:  url  => fetch(url).then(r=>r.json()),
  post: (url,b) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
};

/* ── PARTICLES ───────────────────────────────────────────────────────────── */
function initParticles(isDark) {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let anim, particles = [];
  const resize = () => { canvas.width=innerWidth; canvas.height=innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  const color = isDark ? 'rgba(212,168,67,' : 'rgba(160,114,28,';

  for (let i = 0; i < 38; i++) {
    particles.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.4 + 0.4,
      vx: (Math.random() - 0.5) * 0.25,
      vy: -Math.random() * 0.4 - 0.1,
      alpha: Math.random() * 0.5 + 0.1,
      decay: Math.random() * 0.002 + 0.001,
    });
  }

  const tick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
      if (p.alpha <= 0 || p.y < -10) {
        p.x = Math.random() * innerWidth;
        p.y = innerHeight + 5;
        p.alpha = Math.random() * 0.5 + 0.1;
        p.vy = -Math.random() * 0.4 - 0.1;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = color + p.alpha.toFixed(2) + ')';
      ctx.fill();
    });
    anim = requestAnimationFrame(tick);
  };
  tick();
  return () => { cancelAnimationFrame(anim); window.removeEventListener('resize', resize); };
}

/* ── UTIL ────────────────────────────────────────────────────────────────── */
const fmt_time = ts => {
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
};
const rel_class = r => {
  const v = (r||'').toLowerCase();
  if (/(friend|ally|trust|like|admir|fond)/.test(v)) return 'rel-friendly';
  if (/(host|enemy|hate|fear|suspi|wary|rival)/.test(v)) return 'rel-hostile';
  return 'rel-neutral';
};
const npc_color_sets = [
  ['#2d1a00','#d4a843'],['#001a2d','#4f8ef7'],['#001a12','#3ecf8e'],
  ['#1a001a','#a78bfa'],['#1a0800','#e8724a'],['#0a1a2d','#5bc8e8'],
];
const npc_color = name => npc_color_sets[name.charCodeAt(0) % npc_color_sets.length];

function highlight(text, q) {
  if (!q) return text;
  const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
  return parts.map((p,i) => p.toLowerCase()===q.toLowerCase()
    ? <mark className="search-hl" key={i}>{p}</mark> : p);
}

/* ── TOAST SYSTEM ────────────────────────────────────────────────────────── */
let _tid = 0;
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='info') => {
    const id = ++_tid;
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2600);
  }, []);
  return [toasts, add];
}

function ToastStack({toasts}) {
  const icons = {success:'✓', error:'✗', info:'◆'};
  return (
    <div className="toast-stack">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.type}`} style={{position:'relative',overflow:'hidden'}}>
          <span className="toast-icon">{icons[t.type]}</span>
          <span>{t.msg}</span>
          <div className="toast-bar" style={{background: t.type==='error'?'var(--crimson)':t.type==='success'?'var(--jade)':'var(--gold)'}}/>
        </div>
      ))}
    </div>
  );
}

/* ── DEBUG PANEL ─────────────────────────────────────────────────────────── */
function DebugPanel({debug}) {
  if (!debug) return (
    <div className="debug-panel">
      <div className="debug-hd"><span className="debug-hd-dot"/><span>Pipeline Monitor</span></div>
      <div className="db-row"><span className="db-val-skip">awaiting first message…</span></div>
    </div>
  );
  const {router, entities=[], npcs=[]} = debug;
  return (
    <div className="debug-panel">
      <div className="debug-hd"><span className="debug-hd-dot"/><span>Pipeline Monitor</span></div>
      <div className="db-row">
        <span className="db-key">router</span>
        <span className={router==='SKIP'?'db-val-skip':router==='ERROR'?'db-val-err':'db-val-fetch'}>
          {router}
        </span>
      </div>
      {entities.length>0 && <div className="db-row"><span className="db-key">world</span><span className="db-val-world">{entities.join(', ')}</span></div>}
      {npcs.length>0     && <div className="db-row"><span className="db-key">npcs</span><span className="db-val-npc">{npcs.join(', ')}</span></div>}
      {router==='SKIP' && <div className="db-row" style={{fontSize:'8.5px',marginTop:2}}><span className="db-val-skip">no lookup — context preserved</span></div>}
    </div>
  );
}

/* ── CONTEXT MENU ────────────────────────────────────────────────────────── */
function CtxMenu({x,y,items,onClose}) {
  const ref = useRef();
  useEffect(()=>{
    const h = e => { if(ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);
  return (
    <div ref={ref} className="ctx-menu" style={{left:x,top:y}}>
      {items.map((item,i)=> item==='sep'
        ? <div className="ctx-sep" key={i}/>
        : <div key={i} className={`ctx-item ${item.danger?'red':''}`} onClick={()=>{item.fn();onClose();}}>
            <span className="ci-icon">{item.icon}</span>{item.label}
          </div>
      )}
    </div>
  );
}

/* ── MESSAGE BUBBLE ──────────────────────────────────────────────────────── */
function Bubble({msg,index,onEdit,onDelete,searchQ,timestamp}) {
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(msg.content);
  const [ctx,setCtx]=useState(null);
  const taRef=useRef();
  const isUser=msg.role==='user';

  const startEdit=()=>{setDraft(msg.content);setEditing(true);setTimeout(()=>taRef.current?.focus(),30)};
  const cancel=()=>{setEditing(false);setDraft(msg.content)};
  const save=async()=>{if(!draft.trim())return;await onEdit(index,draft.trim());setEditing(false)};
  const onKey=e=>{
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();save();}
    if(e.key==='Escape')cancel();
  };

  const copy=()=>navigator.clipboard.writeText(msg.content);

  const renderContent=text=>{
    const parts=text.split(/(```[\s\S]*?```)/g);
    return parts.map((p,i)=>{
      if(p.startsWith('```')){
        const code=p.replace(/^```[a-z]*\n?/,'').replace(/```$/,'');
        return <div className="msg-code" key={i}>{code}</div>;
      }
      return <span key={i} style={{whiteSpace:'pre-wrap'}}>{searchQ ? highlight(p,searchQ) : p}</span>;
    });
  };

  const onContextMenu=e=>{
    e.preventDefault();
    setCtx({x:e.clientX,y:e.clientY});
  };

  const ctxItems=[
    {icon:'✎',label:'Edit',fn:startEdit},
    {icon:'⎘',label:'Copy',fn:copy},
    'sep',
    {icon:'✕',label:'Delete',fn:()=>onDelete(index),danger:true},
  ];

  return (
    <>
    {ctx && <CtxMenu x={ctx.x} y={ctx.y} items={ctxItems} onClose={()=>setCtx(null)}/>}
    <div className={`msg-row ${isUser?'user':'ai'}`} onContextMenu={onContextMenu}>
      <div className="msg-meta">
        <div className="msg-avatar">{isUser?'🧝':'⚔'}</div>
        <span className="msg-sender">{isUser?'You':'Narrator'}</span>
        {timestamp && <span className="msg-time">{fmt_time(timestamp)}</span>}
      </div>
      <div className="msg-bubble">
        <div className="bubble-actions">
          <button className="bact" onClick={startEdit}>✎ Edit</button>
          <button className="bact" onClick={copy}>⎘ Copy</button>
          <button className="bact red" onClick={()=>onDelete(index)}>✕</button>
        </div>
        {editing ? (
          <>
            <textarea ref={taRef} className="edit-ta" value={draft}
              onChange={e=>setDraft(e.target.value)} onKeyDown={onKey}
              rows={Math.max(3,draft.split('\n').length+1)}/>
            <div className="edit-row">
              <span className="edit-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> save · <kbd>Esc</kbd> cancel</span>
              <button className="btn-xs cancel" onClick={cancel}>Cancel</button>
              <button className="btn-xs save" onClick={save}>Save</button>
            </div>
          </>
        ) : (
          <div>{renderContent(msg.content)}</div>
        )}
      </div>
    </div>
    </>
  );
}

/* ── CHAT PANEL ──────────────────────────────────────────────────────────── */
const HINTS=[
  '"I look around the tavern…"','"What can you tell me about the old ruins?"',
  '"I draw my sword and charge."','"Let\'s make a deal."','"Search the body for clues."',
];
function ChatPanel({setStatus,setDebug,stats,setStats}) {
  const [history,setHistory]=useState([]);
  const [busy,setBusy]=useState(false);
  const [inputTxt,setInputTxt]=useState('');
  const [searchQ,setSearchQ]=useState('');
  const [showSearch,setShowSearch]=useState(false);
  const feedRef=useRef();
  const inputRef=useRef();

  const scroll=useCallback(()=>{ feedRef.current?.scrollTo({top:feedRef.current.scrollHeight,behavior:'smooth'}); },[]);
  const load=useCallback(async()=>{
    const d=await api.get('/api/history');
    setHistory(d.history||[]);
    setTimeout(scroll,60);
  },[]);

  useEffect(()=>{load();},[]);

  // keyboard shortcut for search
  useEffect(()=>{
    const h=e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();setShowSearch(s=>!s);}
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[]);

  const send=async()=>{
    const text=inputTxt.trim();
    if(!text||busy)return;
    setInputTxt('');
    if(inputRef.current)inputRef.current.textContent='';
    setBusy(true);
    const ts=Date.now();
    setHistory(h=>[...h,{role:'user',content:text,_ts:ts}]);
    setTimeout(scroll,40);
    try{
      const res=await api.post('/api/chat',{message:text});
      setDebug(res.debug||null);
      await load();
      const m=await api.get('/api/metrics');
      setStatus(m.summary);
      setStats(s=>({...s,messages:(s.messages||0)+1}));
    }finally{setBusy(false);inputRef.current?.focus();}
  };

  const editMsg=async(idx,content)=>{await api.post('/api/history/edit',{index:idx,content});await load();};
  const deleteMsg=async(idx)=>{await api.post('/api/history/delete',{index:idx});await load();};

  const filtered=useMemo(()=>{
    if(!searchQ.trim())return history;
    return history.filter(m=>m.content.toLowerCase().includes(searchQ.toLowerCase()));
  },[history,searchQ]);

  const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const sendHint=hint=>{
    if(inputRef.current){inputRef.current.textContent=hint;setInputTxt(hint);inputRef.current.focus();}
  };

  return (
    <div className="panel">
      {showSearch && (
        <div className="chat-search-bar">
          <span style={{fontSize:11,color:'var(--tx-tertiary)',fontFamily:'var(--font-mono)'}}>🔍</span>
          <input className="chat-search-input" autoFocus placeholder="Search messages…"
            value={searchQ} onChange={e=>setSearchQ(e.target.value)}
            onKeyDown={e=>e.key==='Escape'&&setShowSearch(false)}/>
          {searchQ && <span className="cs-count">{filtered.length} result{filtered.length!==1?'s':''}</span>}
          <button style={{fontSize:11,color:'var(--tx-tertiary)',padding:'2px 6px'}} onClick={()=>{setShowSearch(false);setSearchQ('');}}>✕</button>
        </div>
      )}

      <div className="chat-feed" ref={feedRef}>
        {history.length===0&&!busy ? (
          <div className="empty-wrap">
            <div className="empty-sigil">⚔</div>
            <div className="empty-title">Your Story Awaits</div>
            <div className="empty-body">The Narrator is ready. Every conversation is remembered, every character recalled. Step into your world.</div>
            <div className="empty-hints">
              {HINTS.map(h=><div key={h} className="hint-chip" onClick={()=>sendHint(h)}>{h}</div>)}
            </div>
          </div>
        ) : null}

        {filtered.map((msg,i)=>(
          <Bubble key={i} msg={msg} index={history.indexOf(msg)} onEdit={editMsg} onDelete={deleteMsg} searchQ={searchQ} timestamp={msg._ts}/>
        ))}

        {busy&&(
          <div className="typing-row">
            <div className="msg-meta" style={{paddingLeft:4,marginBottom:4}}>
              <div className="msg-avatar" style={{width:26,height:26,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,background:'var(--gold-bg)',border:'1px solid var(--gold-dk)'}}>⚔</div>
              <span className="msg-sender" style={{color:'var(--gold)'}}>Narrator</span>
            </div>
            <div className="typing-bubble">
              <div className="tdots"><span/><span/><span/></div>
              <span className="typing-text">Weaving the narrative…</span>
            </div>
          </div>
        )}
      </div>

      <div className="input-bar">
        <div className="input-outer">
          <div ref={inputRef} className="chat-input" contentEditable suppressContentEditableWarning
            data-ph="Speak your action or say your words…"
            onInput={e=>setInputTxt(e.currentTarget.textContent)}
            onKeyDown={handleKey}/>
          <div className="input-actions">
            <button className="icon-btn" title="Search (Ctrl+F)" onClick={()=>setShowSearch(s=>!s)}
              style={{fontSize:13,marginBottom:2}}>🔍</button>
            <button className="send-btn" onClick={send} disabled={busy||!inputTxt.trim()}>
              {busy?'···':'Send'}
            </button>
          </div>
        </div>
        <div className="input-hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline · <kbd>Ctrl+F</kbd> search</div>
      </div>
    </div>
  );
}

/* ── WORLD PANEL ─────────────────────────────────────────────────────────── */
function WorldPanel({toast}) {
  const [json,setJson]=useState('');
  const [parsed,setParsed]=useState(null);
  const load=async()=>{
    const d=await api.get('/api/world');
    setParsed(d);
    setJson(JSON.stringify(d,null,2));
  };
  useEffect(()=>{load();},[]);

  const save=async()=>{
    try{const p=JSON.parse(json);await api.post('/api/world',p);setParsed(p);toast('World state saved','success');}
    catch{toast('Invalid JSON — fix syntax first','error');}
  };

  const loc=parsed?.player_status?.current_location||'Unknown';
  const inv=(parsed?.player_status?.inventory||[]);
  const quests=(parsed?.player_status?.active_quests||[]);
  const entities=Object.keys(parsed?.entities||{});

  return (
    <div className="panel">
      <div className="panel-head">
        <div className="panel-title">🌍 World State Ledger</div>
        <div className="panel-sub">Live JSON editor — the AI's persistent memory of the world, entities, and narrative conditions.</div>
      </div>
      <div className="panel-body">
        {parsed && (
          <div className="world-grid">
            <div className="world-stat-card">
              <div className="wsc-label">Current Location</div>
              <div className="wsc-val highlight">{loc}</div>
            </div>
            <div className="world-stat-card">
              <div className="wsc-label">Known Entities</div>
              <div className="wsc-val highlight">{entities.length}</div>
            </div>
            <div className="world-stat-card">
              <div className="wsc-label">Active Quests</div>
              <div className="wsc-val">{quests.length===0?'None':quests.length}</div>
            </div>
            <div className="world-stat-card">
              <div className="wsc-label">Inventory Items</div>
              <div className="wsc-val">{inv.length===0?'Empty':inv.length}</div>
            </div>
          </div>
        )}
        <textarea className="json-ed" value={json} onChange={e=>setJson(e.target.value)} rows={28} spellCheck={false}/>
        <div className="btn-row">
          <button className="btn btn-gold" onClick={save}>💾 Save Changes</button>
          <button className="btn btn-ghost" onClick={load}>↺ Reload</button>
        </div>
      </div>
    </div>
  );
}

/* ── NPC PANEL ───────────────────────────────────────────────────────────── */
function NpcPanel() {
  const [npcs,setNpcs]=useState({});
  const [sel,setSel]=useState(null);

  useEffect(()=>{api.get('/api/npcs').then(d=>setNpcs(d.npcs||{}));},[]);

  const entries=Object.entries(npcs);
  const selNpc=sel?npcs[sel]:null;
  const rc=sel?rel_class(selNpc?.relationship):'rel-neutral';
  const [bg,fg]=sel?npc_color(sel):['#1a1a1a','#888'];

  if(!entries.length) return (
    <div className="panel">
      <div className="panel-head">
        <div className="panel-title">🧑 NPC Memory</div>
        <div className="panel-sub">No characters in memory yet.</div>
      </div>
      <div className="panel-body">
        <div className="npc-empty">
          <div style={{fontSize:40,marginBottom:14,opacity:.3}}>🧑</div>
          <div style={{fontFamily:'var(--font-heading)',fontSize:14,color:'var(--tx-tertiary)',marginBottom:8}}>No Characters Yet</div>
          <div style={{fontSize:13,color:'var(--tx-tertiary)',maxWidth:280,lineHeight:1.7}}>
            NPCs you speak with will be remembered here after a sleep cycle runs — personality, relationship, and what was discussed.
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="panel">
      <div className="npc-layout">
        {/* List */}
        <div className="npc-list">
          <div className="npc-list-head">
            <span>{entries.length} character{entries.length!==1?'s':''}</span>
          </div>
          <div className="npc-list-body">
            {entries.map(([name,data])=>{
              const rc2=rel_class(data.relationship);
              const [ibg,ifg]=npc_color(name);
              return (
                <div key={name} className={`npc-item ${rc2} ${sel===name?'active':''}`} onClick={()=>setSel(sel===name?null:name)}>
                  <div className="npc-initial" style={{background:ibg,color:ifg,border:`1px solid ${ifg}33`}}>
                    {name[0].toUpperCase()}
                  </div>
                  <div className="npc-item-info">
                    <div className="npc-item-name">{name}</div>
                    <div className="npc-item-rel">{data.relationship||'Neutral'}</div>
                  </div>
                  <div className={`npc-rel-dot ${rc2}`}/>
                </div>
              );
            })}
          </div>
        </div>

        {/* Detail */}
        <div className="npc-detail-pane">
          {!sel ? (
            <div className="npc-empty">
              <div style={{fontSize:28,opacity:.25,marginBottom:10}}>←</div>
              <div style={{fontSize:12,color:'var(--tx-tertiary)',fontFamily:'var(--font-mono)'}}>Select a character</div>
            </div>
          ) : (
            <>
              <div className="npc-detail-head">
                <div className={`npc-large-avatar ${rc}`} style={{background:bg,color:fg,border:`1px solid ${fg}33`}}>
                  {sel[0].toUpperCase()}
                </div>
                <div>
                  <div className="npc-d-name">{sel}</div>
                  <div className={`npc-d-rel ${rc}`}>
                    <div className={`npc-rel-dot ${rc}`}/>
                    {selNpc?.relationship||'Neutral'}
                  </div>
                  {selNpc?.last_seen_location && <div className="npc-d-loc">📍 {selNpc.last_seen_location}</div>}
                </div>
              </div>
              <div className="npc-detail-body">
                {[
                  ['Personality',selNpc?.personality],
                  ['Topics Discussed',selNpc?.topics_discussed],
                  ['Last Interaction',selNpc?.last_interaction_summary],
                ].filter(([,v])=>v).map(([k,v])=>(
                  <div className="npc-field" key={k}>
                    <div className="nfc-key">{k}</div>
                    <div className="nfc-val">{typeof v==='object'?JSON.stringify(v,null,2):v}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── PROMPTS PANEL ───────────────────────────────────────────────────────── */
function PromptsPanel({toast}) {
  const [p,setP]=useState({});
  const [open,setOpen]=useState('system_prompt_template');
  const defs=[
    {key:'system_prompt_template',label:'System Prompt',desc:'{targeted_context} injects world & NPC data.',rows:5},
    {key:'router_prompt',label:'Router Agent',desc:'Decides if world data lookup is needed.',rows:6},
    {key:'librarian_prompt',label:'Librarian Agent',desc:'Selects specific entities/NPCs to fetch.',rows:6},
    {key:'sleep_cycle_prompt',label:'Sleep Cycle',desc:'Updates world state JSON every N messages.',rows:8},
    {key:'npc_memory_prompt',label:'NPC Memory Extractor',desc:'Extracts NPC personalities and relationships.',rows:7},
  ];
  useEffect(()=>{api.get('/api/prompts').then(setP);},[]);
  const upd=(k,v)=>setP(pr=>({...pr,[k]:v}));
  const save=async()=>{await api.post('/api/prompts',p);toast('All prompts saved','success');};

  return (
    <div className="panel">
      <div className="panel-head">
        <div className="panel-title">⚙ Prompt Configuration</div>
        <div className="panel-sub">Tune every agent. Changes apply on next message.</div>
      </div>
      <div className="panel-body">
        <div className="prompt-grid">
          {defs.map(({key,label,desc,rows})=>(
            <div className="prompt-card" key={key}>
              <div className="prompt-card-head" onClick={()=>setOpen(open===key?null:key)}>
                <div>
                  <div className="prompt-card-title">{label}</div>
                  <div className="prompt-card-desc">{desc}</div>
                </div>
                <span className={`prompt-card-chevron ${open===key?'open':''}`}>▼</span>
              </div>
              {open===key && (
                <div className="prompt-card-body">
                  <textarea className="field-ta" rows={rows}
                    value={p[key]||''} onChange={e=>upd(key,e.target.value)} spellCheck={false}/>
                </div>
              )}
            </div>
          ))}
        </div>
        <div className="btn-row">
          <button className="btn btn-gold" onClick={save}>💾 Save All Prompts</button>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT APP ────────────────────────────────────────────────────────────── */
function App() {
  const [tab,setTab]=useState('chat');
  const [status,setStatus]=useState('Connecting to world…');
  const [debug,setDebug]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [sleeping,setSleeping]=useState(false);
  const [stats,setStats]=useState({messages:0,cycles:0,npcs:0});
  const [toasts,addToast]=useToasts();

  // Load initial data
  useEffect(()=>{
    api.get('/api/metrics').then(d=>setStatus(d.summary));
    api.get('/api/npcs').then(d=>setStats(s=>({...s,npcs:Object.keys(d.npcs||{}).length})));
    api.get('/api/history').then(d=>setStats(s=>({...s,messages:Math.floor((d.history||[]).length/2)})));
  },[]);

  // Particles
  useEffect(()=>{
    const cleanup=initParticles(theme==='dark');
    return cleanup;
  },[theme]);

  const toggleTheme=()=>{
    const next=theme==='dark'?'light':'dark';
    document.body.classList.add('theme-transitioning');
    document.documentElement.setAttribute('data-theme',next);
    setTheme(next);
    setTimeout(()=>document.body.classList.remove('theme-transitioning'),300);
  };

  const forceSleep=async()=>{
    if(sleeping)return;
    setSleeping(true);
    addToast('Sleep cycle running…','info');
    await api.post('/api/sleep',{});
    await new Promise(r=>setTimeout(r,1400));
    const m=await api.get('/api/metrics');
    setStatus(m.summary);
    const n=await api.get('/api/npcs');
    setStats(s=>({...s,cycles:s.cycles+1,npcs:Object.keys(n.npcs||{}).length}));
    setSleeping(false);
    addToast('Sleep cycle complete — world & NPC memory updated','success');
  };

  const clearHistory=async()=>{
    if(!confirm('Delete all chat history? This cannot be undone.'))return;
    await api.post('/api/history/clear',{});
    setStats(s=>({...s,messages:0}));
    addToast('Chat history cleared','info');
    window.location.reload();
  };

  const navItems=[
    {key:'chat',   icon:'💬',label:'Chat Terminal'},
    {key:'world',  icon:'🌍',label:'World Ledger'},
    {key:'npcs',   icon:'🧑',label:'NPC Memory', badge: stats.npcs||null},
    {key:'prompts',icon:'⚙', label:'Prompt Config'},
  ];

  return (
    <div className="app">
      {/* Topbar */}
      <header className="topbar">
        <div className="topbar-brand">
          <div className="brand-mark">
            <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C17.5 22.15 21 17.25 21 12V6L12 2z"/></svg>
          </div>
          <div>
            <div className="brand-name">Chronicle</div>
            <div className="brand-sub">RPG Memory Engine</div>
          </div>
        </div>

        <div className="topbar-center">
          <div className="world-status">
            <div className="ws-dot"/>
            <span className="ws-text">{status}</span>
          </div>
        </div>

        <div className="topbar-right">
          <button className="icon-btn theme-btn" onClick={toggleTheme} title="Toggle theme">
            <span className="theme-icon">{theme==='dark'?'☀':'🌙'}</span>
          </button>
        </div>
      </header>

      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-inner">
          {/* Player card */}
          <div className="player-card">
            <div className="player-avatar">🧝</div>
            <div className="player-name">The Traveller</div>
            <div className="player-loc">📍 {status.split('|')[0]?.replace('📍','').trim()||'Unknown'}</div>
            <div className="xp-label"><span>Progress</span><span>{stats.messages * 12}xp</span></div>
            <div className="xp-bar"><div className="xp-fill" style={{width:`${Math.min((stats.messages*12)%100,100)}%`}}/></div>
          </div>

          {/* Stats */}
          <div className="stats-row">
            <div className="stat-box"><div className="stat-val">{stats.messages}</div><div className="stat-lbl">Messages</div></div>
            <div className="stat-box"><div className="stat-val">{stats.npcs}</div><div className="stat-lbl">NPCs</div></div>
            <div className="stat-box"><div className="stat-val">{stats.cycles}</div><div className="stat-lbl">Cycles</div></div>
          </div>

          <div className="sec-label">Navigate</div>
          {navItems.map(({key,icon,label,badge})=>(
            <button key={key} className={`nav-btn ${tab===key?'active':''}`} onClick={()=>setTab(key)}>
              <div className="nb-icon">{icon}</div>
              <span>{label}</span>
              {badge ? <span className="nb-badge">{badge}</span> : null}
            </button>
          ))}

          <div className="sidebar-divider"/>

          <div className="sec-label">Actions</div>
          <button className="nav-btn green" onClick={forceSleep} disabled={sleeping}>
            <div className="nb-icon">🌙</div>
            <span>{sleeping?'Running…':'Sleep Cycle'}</span>
          </button>
          <button className="nav-btn red" onClick={clearHistory}>
            <div className="nb-icon">🗑</div>
            <span>Clear History</span>
          </button>

          <DebugPanel debug={debug}/>
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        {tab==='chat'    && <ChatPanel    setStatus={setStatus} setDebug={setDebug} stats={stats} setStats={setStats}/>}
        {tab==='world'   && <WorldPanel   toast={addToast}/>}
        {tab==='npcs'    && <NpcPanel/>}
        {tab==='prompts' && <PromptsPanel toast={addToast}/>}
      </main>

      <ToastStack toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
