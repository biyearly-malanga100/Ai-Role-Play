<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RPG Memory Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07090d;
  --bg1:#0c1018;
  --bg2:#121820;
  --bg3:#18202c;
  --bg4:#1e2838;
  --border:#1f2d40;
  --border2:#2a3d55;
  --gold:#c9a84c;
  --gold2:#e2c56e;
  --gold-glow:rgba(201,168,76,.18);
  --gold-dim:#5a4418;
  --emerald:#2dd4a0;
  --emerald-dim:#0e3328;
  --red:#f06a6a;
  --red-dim:#3a1212;
  --blue:#5b9cf6;
  --blue-dim:#142040;
  --purple:#a78bfa;
  --text:#dce8f2;
  --text2:#8fa3bb;
  --text3:#3d5570;
  --user-bg:linear-gradient(135deg,#152238,#1a2d48);
  --ai-bg:#0f161f;
  --radius:12px;
  --font-display:'Cinzel',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(201,168,76,.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(91,156,246,.04) 0%, transparent 60%);
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:#3d5570}
button,input,textarea{font-family:var(--font-body);outline:none;border:none}
button{cursor:pointer}
textarea{resize:vertical}
[contenteditable]:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:230px 1fr;grid-template-rows:56px 1fr;height:100vh}

/* ── Topbar ── */
.topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(12,16,24,.9);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  backdrop-filter:blur(8px);
  position:relative;z-index:20;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-sigil{
  width:34px;height:34px;
  border:1px solid var(--gold-dim);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  background:linear-gradient(135deg,rgba(201,168,76,.08),transparent);
  box-shadow:0 0 12px var(--gold-glow);
}
.brand h1{
  font-family:var(--font-display);
  font-size:14px;letter-spacing:.16em;
  color:var(--gold2);
  text-shadow:0 0 18px rgba(201,168,76,.35);
}
.status-pill{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:5px 14px;
  font-size:11px;color:var(--text2);font-family:var(--font-mono);
  max-width:460px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── Sidebar ── */
.sidebar{
  background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:14px 8px 12px;
  gap:2px;overflow-y:auto;
}
.nav-label{
  font-size:9px;letter-spacing:.18em;color:var(--text3);
  padding:6px 12px 4px;font-weight:700;text-transform:uppercase;
}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:9px;
  background:transparent;color:var(--text2);
  font-size:13px;font-weight:500;
  transition:background .12s,color .12s;
  width:100%;text-align:left;
}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));
  color:var(--gold2);
  border:1px solid rgba(201,168,76,.25);
  box-shadow:0 0 14px rgba(201,168,76,.08);
}
.nav-btn .icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:10px 4px}
.nav-btn.green{color:var(--emerald)}
.nav-btn.green:hover{background:var(--emerald-dim)}
.nav-btn.red{color:var(--red)}
.nav-btn.red:hover{background:var(--red-dim)}
.nav-btn:disabled{opacity:.45;cursor:not-allowed}

/* Debug box */
.debug-box{
  margin-top:auto;
  background:var(--bg0);border:1px solid var(--border);
  border-radius:9px;padding:10px 12px;
  font-family:var(--font-mono);font-size:10px;color:var(--text3);line-height:1.8;
}
.debug-title{font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--text3);margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:4px}
.db-skip{color:var(--text3)}
.db-fetch{color:var(--emerald)}
.db-world{color:var(--blue)}
.db-npc{color:var(--gold)}

/* ── Main ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.panel{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ── Chat ── */
.chat-feed{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:2px}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;height:100%;color:var(--text3);text-align:center;
  padding:40px;
}
.empty-sigil{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-heading{font-family:var(--font-display);font-size:18px;color:var(--text3);
  letter-spacing:.1em;margin-bottom:8px}
.empty-sub{font-size:13px;line-height:1.6;max-width:300px}

/* Message rows */
.msg-row{display:flex;flex-direction:column;margin-bottom:12px}
.msg-row.user{align-items:flex-end}
.msg-row.ai{align-items:flex-start}
.msg-meta{
  font-size:10px;color:var(--text3);
  padding:0 6px;margin-bottom:4px;
  display:flex;align-items:center;gap:6px;
}
.msg-row.user .msg-meta{flex-direction:row-reverse}
.msg-role{font-weight:600;letter-spacing:.05em}
.msg-row.user .msg-role{color:var(--blue)}
.msg-row.ai .msg-role{color:var(--gold)}

.msg-bubble{
  max-width:70%;position:relative;
  border-radius:14px;
  padding:12px 16px;
  font-size:13.5px;line-height:1.7;
  word-break:break-word;
}
.msg-row.user .msg-bubble{
  background:var(--user-bg);
  border:1px solid rgba(91,156,246,.18);
  border-bottom-right-radius:4px;
}
.msg-row.ai .msg-bubble{
  background:var(--ai-bg);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}

/* Hover edit button */
.edit-trigger{
  position:absolute;top:-9px;
  opacity:0;pointer-events:none;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text2);border-radius:5px;
  padding:2px 9px;font-size:10px;font-weight:600;
  transition:opacity .1s;white-space:nowrap;letter-spacing:.04em;
}
.msg-row.user .edit-trigger{right:8px}
.msg-row.ai .edit-trigger{left:8px}
.msg-bubble:hover .edit-trigger{opacity:1;pointer-events:all;cursor:pointer}
.edit-trigger:hover{background:var(--bg4);color:var(--text)}

/* Code blocks */
.msg-code{
  font-family:var(--font-mono);font-size:11.5px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px;
  margin-top:8px;overflow-x:auto;white-space:pre-wrap;
}

/* Inline edit */
.edit-box{
  width:100%;background:var(--bg2);
  border:1px solid var(--border2);border-radius:9px;
  padding:10px 12px;color:var(--text);
  font-size:13.5px;line-height:1.65;
  min-height:56px;margin-top:2px;
  transition:border-color .13s;
}
.edit-box:focus{border-color:var(--gold-dim)}
.edit-actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.edit-hint{font-size:10px;color:var(--text3);margin-right:auto}
.btn-sm{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;transition:all .12s}
.btn-save{background:var(--emerald);color:#000}
.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-cancel:hover{color:var(--text)}

/* Typing */
.typing-indicator{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;font-size:12px;
  color:var(--text3);font-style:italic;
}
.dots{display:flex;gap:3px}
.dots span{
  display:block;width:5px;height:5px;
  background:var(--gold-dim);border-radius:50%;
  animation:bounce .9s infinite ease-in-out;
}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* Input bar */
.input-bar{
  padding:14px 20px;
  background:rgba(12,16,24,.95);
  border-top:1px solid var(--border);
  backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;gap:10px;
}
.input-wrap{
  flex:1;background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:13px;
  display:flex;align-items:flex-end;
  transition:border-color .15s;
  overflow:hidden;
}
.input-wrap:focus-within{border-color:rgba(201,168,76,.35)}
.chat-input{
  flex:1;background:transparent;
  color:var(--text);padding:11px 14px;
  font-size:14px;line-height:1.5;
  max-height:130px;overflow-y:auto;
}
.send-btn{
  padding:11px 22px;
  background:linear-gradient(135deg,var(--gold),#9a7020);
  color:#000;border-radius:11px;
  font-weight:700;font-size:13px;
  letter-spacing:.04em;
  transition:all .14s;flex-shrink:0;
  box-shadow:0 2px 12px rgba(201,168,76,.25);
}
.send-btn:hover:not(:disabled){opacity:.87;transform:translateY(-1px);box-shadow:0 4px 18px rgba(201,168,76,.3)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ── Panel shared ── */
.ph{padding:22px 26px 0;flex-shrink:0}
.ph-title{font-family:var(--font-display);font-size:15px;
  color:var(--gold2);letter-spacing:.08em;margin-bottom:4px}
.ph-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.pb{flex:1;overflow-y:auto;padding:0 26px 24px}

/* JSON editor */
.json-ed{
  width:100%;background:var(--bg2);
  border:1px solid var(--border);border-radius:11px;
  color:#5eead4;font-family:var(--font-mono);
  font-size:11.5px;padding:14px;
  min-height:340px;transition:border-color .14s;
  line-height:1.65;
}
.json-ed:focus{border-color:var(--emerald);outline:none}

/* Buttons */
.btn{
  padding:8px 20px;border-radius:9px;
  font-size:13px;font-weight:600;
  transition:all .13s;
  display:inline-flex;align-items:center;gap:7px;
}
.btn-gold{background:linear-gradient(135deg,var(--gold),#9a7020);color:#000;
  box-shadow:0 2px 10px rgba(201,168,76,.2)}
.btn-gold:hover{opacity:.85;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-row{display:flex;gap:8px;margin-top:14px}

/* Field */
.field-label{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text2);
  margin-bottom:5px;margin-top:18px;
}
.field-ta{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:var(--font-mono);
  font-size:11.5px;padding:11px 12px;line-height:1.6;
  transition:border-color .14s;
}
.field-ta:focus{border-color:var(--blue);outline:none}

/* NPC */
.npc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding-top:2px}
.npc-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:16px;cursor:pointer;
  transition:all .14s;
}
.npc-card:hover{border-color:var(--gold-dim);background:var(--bg3);transform:translateY(-1px)}
.npc-card.sel{border-color:var(--gold);background:var(--bg3);
  box-shadow:0 0 20px rgba(201,168,76,.1)}
.npc-name{font-family:var(--font-display);font-size:13px;color:var(--gold2);margin-bottom:6px;
  letter-spacing:.05em}
.rel-badge{
  display:inline-block;font-size:10px;font-weight:700;
  letter-spacing:.1em;padding:2px 9px;border-radius:20px;
  text-transform:uppercase;margin-bottom:9px;
}
.rel-f{background:rgba(45,212,160,.12);color:var(--emerald)}
.rel-h{background:var(--red-dim);color:var(--red)}
.rel-n{background:var(--bg4);color:var(--text3)}
.npc-preview{font-size:12px;color:var(--text3);line-height:1.55}

.npc-detail{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:22px;margin-top:14px;
}
.npc-d-name{font-family:var(--font-display);font-size:17px;
  color:var(--gold2);letter-spacing:.07em;margin-bottom:14px;
  padding-bottom:12px;border-bottom:1px solid var(--border);}
.npc-field{margin-bottom:12px}
.npc-fk{font-size:9px;font-weight:700;letter-spacing:.15em;
  color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.npc-fv{font-size:13px;color:var(--text);line-height:1.55}

/* Prompt cards */
.prompt-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:11px;padding:16px;margin-bottom:12px;
}
.prompt-card-title{font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--blue);margin-bottom:3px}
.prompt-card-desc{font-size:11px;color:var(--text3);margin-bottom:10px}

/* Toast */
.toast-wrap{
  position:fixed;bottom:22px;right:22px;
  z-index:9999;display:flex;flex-direction:column;gap:6px;
}
.toast{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);border-radius:9px;
  padding:10px 18px;font-size:13px;
  animation:tin .18s ease;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  get:  url      => fetch(url).then(r=>r.json()),
  post: (url,bd) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bd)}).then(r=>r.json()),
};

// ── Toast stack ───────────────────────────────────────────────────────────────
function ToastStack({ toasts, removeToast }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}
    </div>
  );
}

// ── Debug Panel ───────────────────────────────────────────────────────────────
function DebugPanel({ debug }) {
  if (!debug) return (
    <div className="debug-box">
      <div className="debug-title">Pipeline · Last Turn</div>
      <span className="db-skip">awaiting first message</span>
    </div>
  );
  const { router, entities=[], npcs=[] } = debug;
  return (
    <div className="debug-box">
      <div className="debug-title">Pipeline · Last Turn</div>
      <div className={router==='SKIP'?'db-skip':'db-fetch'}>▸ router: {router}</div>
      {entities.length>0 && <div className="db-world">▸ world: {entities.join(', ')}</div>}
      {npcs.length>0     && <div className="db-npc">▸ npcs: {npcs.join(', ')}</div>}
      {router==='SKIP' && entities.length===0 && <div className="db-skip" style={{fontSize:'9px',marginTop:2}}>no lookup · context saved</div>}
    </div>
  );
}

// ── Message Bubble ────────────────────────────────────────────────────────────
function Bubble({ msg, index, onEdit }) {
  const [editing, setEditing]  = useState(false);
  const [draft,   setDraft]    = useState(msg.content);
  const taRef = useRef(null);
  const isUser = msg.role === 'user';

  const startEdit = () => { setDraft(msg.content); setEditing(true); setTimeout(()=>taRef.current?.focus(),30); };
  const cancel    = () => { setEditing(false); setDraft(msg.content); };
  const save      = async () => { if(!draft.trim()) return; await onEdit(index, draft.trim()); setEditing(false); };

  const onKey = e => {
    if (e.key==='Enter' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); save(); }
    if (e.key==='Escape') cancel();
  };

  const renderContent = text => {
    const parts = text.split(/(```[\s\S]*?```)/g);
    return parts.map((p,i)=>{
      if (p.startsWith('```')) {
        const code = p.replace(/^```[a-z]*\n?/,'').replace(/```$/,'');
        return <div className="msg-code" key={i}>{code}</div>;
      }
      return <span key={i} style={{whiteSpace:'pre-wrap'}}>{p}</span>;
    });
  };

  return (
    <div className={`msg-row ${isUser?'user':'ai'}`}>
      <div className="msg-meta">
        <span className="msg-role">{isUser ? 'You' : '⚔ Narrator'}</span>
      </div>
      <div className="msg-bubble">
        <button className="edit-trigger" onClick={startEdit}>✎ Edit</button>

        {editing ? (
          <>
            <textarea
              ref={taRef}
              className="edit-box"
              value={draft}
              onChange={e=>setDraft(e.target.value)}
              onKeyDown={onKey}
              rows={Math.max(3, draft.split('\n').length+1)}
            />
            <div className="edit-actions">
              <span className="edit-hint">Ctrl+Enter save · Esc cancel</span>
              <button className="btn-sm btn-cancel" onClick={cancel}>Cancel</button>
              <button className="btn-sm btn-save"   onClick={save}>Save</button>
            </div>
          </>
        ) : (
          <div>{renderContent(msg.content)}</div>
        )}
      </div>
    </div>
  );
}

// ── Chat Panel ────────────────────────────────────────────────────────────────
function ChatPanel({ setStatus, setDebug }) {
  const [history, setHistory] = useState([]);
  const [busy,    setBusy]    = useState(false);
  const [inputTxt,setInputTxt]= useState('');
  const feedRef   = useRef(null);
  const inputRef  = useRef(null);

  const scrollDown = () => feedRef.current?.scrollTo({ top: feedRef.current.scrollHeight, behavior:'smooth' });

  const load = useCallback(async () => {
    const d = await api.get('/api/history');
    setHistory(d.history || []);
    setTimeout(scrollDown, 60);
  }, []);

  useEffect(()=>{ load(); }, []);

  const send = async () => {
    const text = inputTxt.trim();
    if (!text || busy) return;
    setInputTxt('');
    if (inputRef.current) inputRef.current.textContent = '';
    setBusy(true);
    setHistory(h=>[...h,{role:'user',content:text}]);
    setTimeout(scrollDown,40);
    try {
      const res = await api.post('/api/chat',{message:text});
      setDebug(res.debug||null);
      await load();
      const m = await api.get('/api/metrics');
      setStatus(m.summary);
    } finally {
      setBusy(false);
      inputRef.current?.focus();
    }
  };

  const editMsg = async (idx, content) => {
    await api.post('/api/history/edit',{index:idx,content});
    await load();
  };

  const handleKey = e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  return (
    <div className="panel">
      <div className="chat-feed" ref={feedRef}>
        {history.length===0 && !busy && (
          <div className="empty-state">
            <div className="empty-sigil">⚔</div>
            <div className="empty-heading">Your Story Awaits</div>
            <div className="empty-sub">Type a message below to step into your world. The Narrator remembers everything.</div>
          </div>
        )}
        {history.map((msg,i)=>(
          <Bubble key={i} msg={msg} index={i} onEdit={editMsg}/>
        ))}
        {busy && (
          <div className="msg-row ai">
            <div className="msg-meta"><span className="msg-role">⚔ Narrator</span></div>
            <div className="msg-bubble">
              <div className="typing-indicator">
                <div className="dots"><span/><span/><span/></div>
                <span>Weaving the narrative...</span>
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="input-bar">
        <div className="input-wrap">
          <div
            ref={inputRef}
            className="chat-input"
            contentEditable
            suppressContentEditableWarning
            data-placeholder="Speak your action or say your words..."
            onInput={e=>setInputTxt(e.currentTarget.textContent)}
            onKeyDown={handleKey}
          />
        </div>
        <button className="send-btn" onClick={send} disabled={busy||!inputTxt.trim()}>
          {busy ? '···' : 'Send ➤'}
        </button>
      </div>
    </div>
  );
}

// ── World Panel ───────────────────────────────────────────────────────────────
function WorldPanel({ toast }) {
  const [json, setJson] = useState('');

  const load = async () => {
    const d = await api.get('/api/world');
    setJson(JSON.stringify(d,null,2));
  };
  useEffect(()=>{ load(); },[]);

  const save = async () => {
    try {
      const parsed = JSON.parse(json);
      await api.post('/api/world', parsed);
      toast('✓ World state saved successfully');
    } catch { toast('✗ Invalid JSON — check the syntax'); }
  };

  return (
    <div className="panel">
      <div className="ph">
        <div className="ph-title">🌍 World State Ledger</div>
        <div className="ph-sub">Live JSON editor — the AI's persistent memory of the world, entities, and active conditions.</div>
      </div>
      <div className="pb">
        <textarea
          className="json-ed"
          value={json}
          onChange={e=>setJson(e.target.value)}
          rows={30}
          spellCheck={false}
        />
        <div className="btn-row">
          <button className="btn btn-gold" onClick={save}>💾 Save Changes</button>
          <button className="btn btn-ghost" onClick={load}>↺ Reload</button>
        </div>
      </div>
    </div>
  );
}

// ── NPC Panel ─────────────────────────────────────────────────────────────────
function NpcPanel() {
  const [npcs, setNpcs]     = useState({});
  const [sel,  setSel]      = useState(null);

  useEffect(()=>{
    api.get('/api/npcs').then(d=>setNpcs(d.npcs||{}));
  },[]);

  const relClass = r => {
    const v = (r||'').toLowerCase();
    if (v.includes('friend')||v.includes('ally')||v.includes('trust')||v.includes('like')) return 'rel-f';
    if (v.includes('host')||v.includes('enemy')||v.includes('hate')||v.includes('suspi')) return 'rel-h';
    return 'rel-n';
  };

  const entries = Object.entries(npcs);

  if (!entries.length) return (
    <div className="panel">
      <div className="ph"><div className="ph-title">🧑 NPC Memory Files</div></div>
      <div className="pb">
        <div className="empty-state">
          <div className="empty-sigil">🧑</div>
          <div className="empty-heading" style={{fontFamily:'var(--font-body)',fontSize:14}}>No Characters Yet</div>
          <div className="empty-sub">NPCs you interact with will appear here after the sleep cycle runs. Their personality, relationship, and conversation history will all be saved.</div>
        </div>
      </div>
    </div>
  );

  const npc = sel ? npcs[sel] : null;

  return (
    <div className="panel">
      <div className="ph">
        <div className="ph-title">🧑 NPC Memory Files</div>
        <div className="ph-sub">{entries.length} character{entries.length!==1?'s':''} in memory. Click a card to view their full profile.</div>
      </div>
      <div className="pb">
        <div className="npc-grid">
          {entries.map(([name,data])=>(
            <div key={name}
              className={`npc-card ${sel===name?'sel':''}`}
              onClick={()=>setSel(sel===name?null:name)}>
              <div className="npc-name">{name}</div>
              <div className={`rel-badge ${relClass(data.relationship)}`}>{data.relationship||'Neutral'}</div>
              <div className="npc-preview">{data.last_interaction_summary||'No interaction on record.'}</div>
            </div>
          ))}
        </div>

        {npc && (
          <div className="npc-detail">
            <div className="npc-d-name">{sel}</div>
            {[
              ['Personality',      npc.personality],
              ['Last Seen At',     npc.last_seen_location],
              ['Relationship',     npc.relationship],
              ['Topics Discussed', npc.topics_discussed],
              ['Last Interaction', npc.last_interaction_summary],
            ].filter(([,v])=>v).map(([k,v])=>(
              <div className="npc-field" key={k}>
                <div className="npc-fk">{k}</div>
                <div className="npc-fv">{typeof v==='object'?JSON.stringify(v,null,2):v}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Prompts Panel ─────────────────────────────────────────────────────────────
function PromptsPanel({ toast }) {
  const [p, setP] = useState({});
  const defs = [
    {key:'system_prompt_template', label:'System Prompt',        desc:'{targeted_context} tag injects world & NPC data automatically.',rows:4},
    {key:'router_prompt',          label:'Router Agent',         desc:'Decides YES/NO: does this message need world data?',rows:5},
    {key:'librarian_prompt',       label:'Librarian Agent',      desc:'Picks which specific entities/NPCs to pull into context.',rows:5},
    {key:'sleep_cycle_prompt',     label:'Sleep Cycle',          desc:'Updates the world state JSON after every N messages.',rows:7},
    {key:'npc_memory_prompt',      label:'NPC Memory Extractor', desc:'Extracts and stores NPC personalities and relationship data.',rows:6},
  ];
  useEffect(()=>{ api.get('/api/prompts').then(setP); },[]);
  const upd = (k,v) => setP(prev=>({...prev,[k]:v}));
  const save = async () => { await api.post('/api/prompts',p); toast('✓ All prompts saved'); };

  return (
    <div className="panel">
      <div className="ph">
        <div className="ph-title">⚙ Prompt Configuration</div>
        <div className="ph-sub">Every agent prompt is tunable. Changes take effect on the next message.</div>
      </div>
      <div className="pb">
        {defs.map(({key,label,desc,rows})=>(
          <div className="prompt-card" key={key}>
            <div className="prompt-card-title">{label}</div>
            <div className="prompt-card-desc">{desc}</div>
            <textarea className="field-ta" rows={rows}
              value={p[key]||''} onChange={e=>upd(key,e.target.value)} spellCheck={false}/>
          </div>
        ))}
        <div className="btn-row">
          <button className="btn btn-gold" onClick={save}>💾 Save All Prompts</button>
        </div>
      </div>
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────────────────────────
let toastId = 0;
function App() {
  const [tab,     setTab]     = useState('chat');
  const [status,  setStatus]  = useState('Loading...');
  const [debug,   setDebug]   = useState(null);
  const [toasts,  setToasts]  = useState([]);
  const [sleeping,setSleeping]= useState(false);

  useEffect(()=>{ api.get('/api/metrics').then(d=>setStatus(d.summary)); },[]);

  const toast = msg => {
    const id = ++toastId;
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2500);
  };

  const forceSleep = async () => {
    if (sleeping) return;
    setSleeping(true);
    toast('⏳ Sleep cycle running in background...');
    await api.post('/api/sleep',{});
    await new Promise(r=>setTimeout(r,1200));
    const m = await api.get('/api/metrics');
    setStatus(m.summary);
    toast('✓ Sleep cycle done — world & NPC memory updated');
    setSleeping(false);
  };

  const clearHistory = async () => {
    if (!confirm('Delete all chat history? Cannot be undone.')) return;
    await api.post('/api/history/clear',{});
    toast('✓ History cleared');
    window.location.reload();
  };

  const navItems = [
    {key:'chat',    icon:'💬', label:'Chat Terminal'},
    {key:'world',   icon:'🌍', label:'World Ledger'},
    {key:'npcs',    icon:'🧑', label:'NPC Memory'},
    {key:'prompts', icon:'⚙',  label:'Prompt Config'},
  ];

  return (
    <div className="layout">
      <header className="topbar">
        <div className="brand">
          <div className="brand-sigil">⚔</div>
          <h1>RPG Memory Engine</h1>
        </div>
        <div className="status-pill">{status}</div>
      </header>

      <aside className="sidebar">
        <div className="nav-label">Navigate</div>
        {navItems.map(({key,icon,label})=>(
          <button key={key} className={`nav-btn ${tab===key?'active':''}`} onClick={()=>setTab(key)}>
            <span className="icon">{icon}</span><span>{label}</span>
          </button>
        ))}

        <div className="divider"/>

        <button className="nav-btn green" onClick={forceSleep} disabled={sleeping}>
          <span className="icon">🌙</span>
          <span>{sleeping?'Running...':'Force Sleep Cycle'}</span>
        </button>
        <button className="nav-btn red" onClick={clearHistory}>
          <span className="icon">🗑</span><span>Clear History</span>
        </button>

        <DebugPanel debug={debug}/>
      </aside>

      <main className="main">
        {tab==='chat'    && <ChatPanel    setStatus={setStatus} setDebug={setDebug}/>}
        {tab==='world'   && <WorldPanel   toast={toast}/>}
        {tab==='npcs'    && <NpcPanel/>}
        {tab==='prompts' && <PromptsPanel toast={toast}/>}
      </main>

      <ToastStack toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
